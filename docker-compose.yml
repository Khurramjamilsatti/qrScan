# Local development — PostgreSQL only.
# Full production-like stack: docker-compose.prod.yml (see docs/DEPLOYMENT.md)

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: qrscan
      POSTGRES_USER: qrscan
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
