apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: qrscan

resources:
  - namespace.yaml
  - configmap.yaml
  - postgres-service.yaml
  - postgres-statefulset.yaml
  - api-storage-pvc.yaml
  - api-service.yaml
  - api-deployment.yaml
  - queue-deployment.yaml
  - web-service.yaml
  - web-deployment.yaml
  - ingress.yaml

# Apply secrets separately (not in kustomization):
#   cp k8s/secret.example.yaml k8s/secret.yaml
#   kubectl apply -f k8s/secret.yaml

images:
  - name: ghcr.io/khurramjamilsatti/qrscan-api
    newName: ghcr.io/khurramjamilsatti/qrscan-api
    newTag: latest
  - name: ghcr.io/khurramjamilsatti/qrscan-web
    newName: ghcr.io/khurramjamilsatti/qrscan-web
    newTag: latest
