apiVersion: apps/v1
kind: Deployment
metadata:
  name: qrscan-queue
  namespace: qrscan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qrscan-queue
  template:
    metadata:
      labels:
        app: qrscan-queue
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: queue
          image: ghcr.io/khurramjamilsatti/qrscan-api:latest
          imagePullPolicy: Always
          command: ['php', 'artisan', 'queue:work', '--sleep=3', '--tries=3', '--max-time=3600']
          envFrom:
            - configMapRef:
                name: qrscan-config
          env:
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: qrscan-secrets
                  key: APP_KEY
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: qrscan-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: qrscan-secrets
                  key: DB_PASSWORD
            - name: STRIPE_KEY
              valueFrom:
                secretKeyRef:
                  name: qrscan-secrets
                  key: STRIPE_KEY
            - name: STRIPE_SECRET
              valueFrom:
                secretKeyRef:
                  name: qrscan-secrets
                  key: STRIPE_SECRET
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: qrscan-secrets
                  key: STRIPE_WEBHOOK_SECRET
                  optional: true
            - name: RUN_MIGRATIONS
              value: "false"
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
