# Copy to secret.yaml, fill values, then: kubectl apply -f k8s/secret.yaml
# NEVER commit secret.yaml with real values.
apiVersion: v1
kind: Secret
metadata:
  name: qrscan-secrets
  namespace: qrscan
type: Opaque
stringData:
  APP_KEY: "base64:REPLACE_WITH_php_artisan_key_generate_show"
  DB_USERNAME: qrscan
  DB_PASSWORD: REPLACE_WITH_STRONG_PASSWORD
  POSTGRES_PASSWORD: REPLACE_WITH_STRONG_PASSWORD
  STRIPE_KEY: pk_test_REPLACE
  STRIPE_SECRET: sk_test_REPLACE
  STRIPE_WEBHOOK_SECRET: whsec_REPLACE
