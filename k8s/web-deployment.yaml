apiVersion: apps/v1
kind: Deployment
metadata:
  name: qrscan-web
  namespace: qrscan
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qrscan-web
  template:
    metadata:
      labels:
        app: qrscan-web
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: web
          image: ghcr.io/khurramjamilsatti/qrscan-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
