apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qrscan
  namespace: qrscan
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "32m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - qrscan.digital
        - www.qrscan.digital
      secretName: qrscan-tls
  rules:
    - host: qrscan.digital
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 8080
    - host: www.qrscan.digital
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 8080
