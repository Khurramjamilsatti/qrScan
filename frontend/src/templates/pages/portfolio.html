<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #f8f6fc; color: #1a1333; }
  .page { max-width: 400px; margin: 0 auto; background: #fff; border-radius: 20px; border: 1px solid #e8e4f0; }
  .header { height: 80px; border-radius: 20px 20px 0 0; overflow: hidden; {{{headerBgStyle}}} }
  .body { padding: 24px 20px; }
  h2 { font-size: 22px; font-weight: 700; }
  .about { font-size: 13px; color: #5c5470; margin-top: 10px; line-height: 1.6; }
  .project { margin-top: 12px; border: 1px solid #e8e4f0; border-radius: 12px; overflow: hidden; }
  .project-img { height: 72px; background-size: cover; background-position: center; background-color: #faf8fd; }
  .project-body { padding: 10px 12px; }
  .project-title { font-size: 13px; font-weight: 700; }
  .project-desc { font-size: 12px; color: #8b839c; margin-top: 2px; }
  .sections { margin-top: 8px; }
  {{{sectionStyles}}}
</style>
</head>
<body>
  <div class="page">
    <div class="header"></div>
    <div class="body">
      <h2>{{headline}}</h2>
      {{#if about}}<p class="about">{{about}}</p>{{/if}}
      {{{projectsHtml}}}
      {{#if hasSections}}<div class="sections">{{{sectionsHtml}}}</div>{{/if}}
    </div>
  </div>
</body>
</html>
