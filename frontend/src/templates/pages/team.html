<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f8f6fc; color: #1a1333; }
  .page { max-width: 400px; margin: 0 auto; background: #fff; border-radius: 20px; border: 1px solid #e8e4f0; padding: 24px 20px; }
  h2 { font-size: 22px; font-weight: 700; }
  .about { font-size: 13px; color: #5c5470; margin-top: 10px; line-height: 1.6; }
  .member { display: flex; gap: 12px; margin-top: 12px; align-items: flex-start; }
  .member-img { width: 44px; height: 44px; border-radius: 50%; background-size: cover; background-position: center; background-color: #faf8fd; flex-shrink: 0; }
  .member-name { font-size: 13px; font-weight: 700; }
  .member-role { font-size: 12px; color: {{themeColor}}; }
  .member-bio { font-size: 11px; color: #8b839c; margin-top: 2px; }
  .sections { margin-top: 8px; }
  {{{sectionStyles}}}
</style>
</head>
<body>
  <div class="page">
    <h2>{{headline}}</h2>
    {{#if about}}<p class="about">{{about}}</p>{{/if}}
    {{{membersHtml}}}
    {{#if hasSections}}<div class="sections">{{{sectionsHtml}}}</div>{{/if}}
  </div>
</body>
</html>
