<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f4f2f8; color: #1a1333; }
  .page { max-width: 400px; margin: 0 auto; background: #fff; border-radius: 20px; border: 1px solid #e8e4f0; padding: 24px 20px; }
  h2 { font-size: 20px; font-weight: 800; }
  .sub { font-size: 13px; color: #5c5470; margin-top: 8px; }
  .plan { margin-top: 12px; padding: 12px; border: 1px solid #e8e4f0; border-radius: 12px; background: #faf8fd; }
  .plan-name { font-size: 13px; font-weight: 700; }
  .plan-price { font-size: 18px; font-weight: 800; color: {{themeColor}}; margin-top: 4px; }
  .plan-desc { font-size: 12px; color: #8b839c; margin-top: 2px; }
  .plan ul { margin: 8px 0 0; padding-left: 16px; font-size: 12px; color: #5c5470; }
  .cta { display: inline-block; margin-top: 16px; padding: 10px 20px; background: {{themeColor}}; color: #fff; font-size: 13px; font-weight: 600; border-radius: 999px; text-decoration: none; }
  .sections { margin-top: 8px; }
  {{{sectionStyles}}}
</style>
</head>
<body>
  <div class="page">
    <h2>{{headline}}</h2>
    {{#if subheadline}}<p class="sub">{{subheadline}}</p>{{/if}}
    {{{plansHtml}}}
    {{{ctaHtml}}}
    {{#if hasSections}}<div class="sections">{{{sectionsHtml}}}</div>{{/if}}
  </div>
</body>
</html>
