<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #fff; color: #1a1333; }
  .page { max-width: 400px; margin: 0 auto; padding: 28px 22px; }
  h2 { font-size: 24px; font-weight: 800; }
  .about { font-size: 13px; color: #5c5470; margin-top: 10px; line-height: 1.6; }
  .skills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .skill { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 999px; border: 1px solid #e8e4f0; background: #faf8fd; }
  .exp { margin-top: 12px; padding-left: 12px; border-left: 2px solid {{themeColor}}; }
  .exp-title { font-size: 13px; font-weight: 700; }
  .exp-period { font-size: 11px; color: #8b839c; }
  .exp-desc { font-size: 12px; color: #5c5470; margin-top: 4px; }
  .cta { display: inline-block; margin-top: 16px; padding: 10px 20px; background: {{themeColor}}; color: #fff; font-size: 13px; font-weight: 600; border-radius: 999px; text-decoration: none; }
  .sections { margin-top: 16px; }
  {{{sectionStyles}}}
</style>
</head>
<body>
  <div class="page">
    <h2>{{headline}}</h2>
    {{#if about}}<p class="about">{{about}}</p>{{/if}}
    {{{skillsHtml}}}
    {{{experienceHtml}}}
    {{{ctaHtml}}}
    {{#if hasSections}}<div class="sections">{{{sectionsHtml}}}</div>{{/if}}
  </div>
</body>
</html>
