<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #1a1333; padding: 8px; }
  .page { max-width: 400px; margin: 0 auto; background: #fff; border-radius: 20px; box-shadow: 0 12px 40px rgba(0,0,0,.2); }
  .body { padding: 24px 20px; }
  .badge { display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; padding: 4px 10px; border-radius: 999px; background: color-mix(in srgb, {{themeColor}} 15%, transparent); color: {{themeColor}}; margin-bottom: 8px; }
  h2 { font-size: 22px; font-weight: 800; }
  .meta { font-size: 13px; color: #5c5470; margin-top: 8px; }
  .sub { font-size: 13px; color: #5c5470; margin-top: 12px; line-height: 1.55; }
  .cta { display: inline-block; margin-top: 16px; padding: 10px 20px; background: {{themeColor}}; color: #fff; font-size: 13px; font-weight: 600; border-radius: 999px; text-decoration: none; }
  .sections { margin-top: 8px; }
  {{{sectionStyles}}}
</style>
</head>
<body>
  <div class="page">
    <div class="body">
      <span class="badge">Event</span>
      <h2>{{eventName}}</h2>
      {{#if date}}<div class="meta">📅 {{date}}</div>{{/if}}
      {{#if location}}<div class="meta">📍 {{location}}</div>{{/if}}
      {{#if description}}<p class="sub">{{description}}</p>{{/if}}
      {{{ctaHtml}}}
      {{#if hasSections}}<div class="sections">{{{sectionsHtml}}}</div>{{/if}}
    </div>
  </div>
</body>
</html>
