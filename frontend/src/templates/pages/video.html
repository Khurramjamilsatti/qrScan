<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f0f23; padding: 8px; }
  .page { max-width: 400px; margin: 0 auto; background: #fff; border-radius: 20px; overflow: hidden; }
  .body { padding: 24px 20px; }
  h2 { font-size: 20px; font-weight: 800; }
  .sub { font-size: 13px; color: #5c5470; margin-top: 10px; line-height: 1.55; }
  .video-wrap { position: relative; width: 100%; padding-bottom: 56%; margin-top: 12px; border-radius: 12px; overflow: hidden; background: #000; }
  .video-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
  .cta { display: inline-block; margin-top: 16px; padding: 10px 20px; background: {{themeColor}}; color: #fff; font-size: 13px; font-weight: 600; border-radius: 999px; text-decoration: none; }
  .sections { margin-top: 8px; }
  {{{sectionStyles}}}
</style>
</head>
<body>
  <div class="page">
    <div class="body">
      <h2>{{headline}}</h2>
      {{{videoHtml}}}
      {{#if description}}<p class="sub">{{description}}</p>{{/if}}
      {{{ctaHtml}}}
      {{#if hasSections}}<div class="sections">{{{sectionsHtml}}}</div>{{/if}}
    </div>
  </div>
</body>
</html>
