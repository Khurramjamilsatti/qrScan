<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: linear-gradient(180deg, #faf8fd, #f4f2f8); color: #1a1333; min-height: 100vh; }
  .page { max-width: 400px; margin: 0 auto; padding: 32px 20px; text-align: center; }
  h2 { font-size: 22px; font-weight: 800; }
  .bio { font-size: 13px; color: #5c5470; margin-top: 8px; line-height: 1.5; }
  .profile-link { display: block; margin-top: 10px; padding: 12px 16px; border-radius: 12px; border: 1px solid #e8e4f0; background: #fff; text-decoration: none; color: #1a1333; font-size: 14px; font-weight: 600; }
  .sections { margin-top: 20px; text-align: left; }
  {{{sectionStyles}}}
</style>
</head>
<body>
  <div class="page">
    <h2>{{headline}}</h2>
    {{#if bio}}<p class="bio">{{bio}}</p>{{/if}}
    {{{linksHtml}}}
    {{#if hasSections}}<div class="sections">{{{sectionsHtml}}}</div>{{/if}}
  </div>
</body>
</html>
