<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f4f2f8; color: #1a1333; }
  .page { max-width: 400px; margin: 0 auto; background: #fff; border-radius: 20px; border: 1px solid #e8e4f0; box-shadow: 0 8px 28px rgba(26,19,51,.08); }
  .header { height: 88px; position: relative; border-radius: 20px 20px 0 0; overflow: hidden; {{{headerBgStyle}}} }
  .header .logo { position: absolute; bottom: -18px; left: 20px; width: 44px; height: 44px; border-radius: 12px; border: 3px solid #fff; object-fit: cover; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
  .body { padding: 28px 20px 20px; }
  h2 { font-size: 20px; font-weight: 800; line-height: 1.3; margin-top: 8px; }
  .sub { font-size: 13px; color: #5c5470; margin-top: 8px; line-height: 1.55; }
  .cta { display: inline-block; margin-top: 16px; padding: 10px 20px; background: {{themeColor}}; color: #fff; font-size: 13px; font-weight: 600; border-radius: 999px; text-decoration: none; }
  .features { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
  .feature { padding: 12px; background: #faf8fd; border: 1px solid #e8e4f0; border-radius: 12px; }
  .feature strong { display: block; font-size: 13px; }
  .feature span { font-size: 12px; color: #8b839c; margin-top: 2px; display: block; }
  .sections { margin-top: 8px; }
  {{{sectionStyles}}}
</style>
</head>
<body>
  <div class="page">
    <div class="header">{{{logoHtml}}}</div>
    <div class="body">
      <h2>{{headline}}</h2>
      {{#if subheadline}}<p class="sub">{{subheadline}}</p>{{/if}}
      {{{ctaHtml}}}
      {{{featuresHtml}}}
      {{#if hasSections}}<div class="sections">{{{sectionsHtml}}}</div>{{/if}}
    </div>
  </div>
</body>
</html>
