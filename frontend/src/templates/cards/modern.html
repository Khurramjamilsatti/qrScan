<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: linear-gradient(180deg, color-mix(in srgb, {{themeColor}} 8%, #fff), #f8f6fc); color: #1a1333; }
  .card { max-width: 360px; margin: 0 auto; background: #fff; border-radius: 24px; overflow: hidden; border: 1px solid #e8e4f0; box-shadow: 0 12px 36px rgba(26,19,51,.1); text-align: center; }
  .header { height: 72px; background: linear-gradient(135deg, {{themeColor}}, color-mix(in srgb, {{themeColor}} 50%, #6b4fa0)); {{{headerBgStyle}}} }
  .body { padding: 0 24px 24px; margin-top: -48px; }
  .avatar-wrap { display: flex; justify-content: center; }
  .avatar { width: 96px; height: 96px; border-radius: 50%; border: 4px solid #fff; background: #fff; overflow: hidden; box-shadow: 0 8px 24px color-mix(in srgb, {{themeColor}} 30%, transparent); display: flex; align-items: center; justify-content: center; font-size: 34px; font-weight: 800; color: {{themeColor}}; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .logo { width: 32px; height: 32px; object-fit: contain; margin: 12px auto 0; display: block; }
  h1 { font-size: 24px; font-weight: 800; margin-top: 14px; }
  .tagline { font-size: 13px; color: {{themeColor}}; font-weight: 600; margin-top: 6px; }
  .role { font-size: 14px; color: #5c5470; margin-top: 4px; }
  .bio { font-size: 13px; color: #5c5470; line-height: 1.6; margin-top: 14px; text-align: left; }
  .contacts { margin-top: 16px; text-align: left; display: flex; flex-direction: column; gap: 6px; }
  .contact { font-size: 13px; color: #5c5470; }
  .social { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; justify-content: center; }
  .pill { font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: 999px; background: color-mix(in srgb, {{themeColor}} 12%, #fff); color: {{themeColor}}; text-decoration: none; }
  .footer { margin-top: 18px; padding-top: 12px; border-top: 1px solid #e8e4f0; font-size: 11px; font-family: monospace; color: #8b839c; }
  {{{embedStyles}}}
</style>
</head>
<body>
  <div class="card">
    <div class="header"></div>
    <div class="body">
      <div class="avatar-wrap"><div class="avatar">{{{avatarHtml}}}</div></div>
      {{{logoHtml}}}
      <h1>{{fullName}}</h1>
      {{#if tagline}}<p class="tagline">{{tagline}}</p>{{/if}}
      <p class="role">{{roleLine}}</p>
      {{#if bio}}<p class="bio">{{bio}}</p>{{/if}}
      <div class="contacts">{{{contactsHtml}}}</div>
      {{{socialHtml}}}
      <div class="footer">{{cardUrl}}</div>
    </div>
  </div>
</body>
</html>
