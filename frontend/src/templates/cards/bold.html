<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #1a1333; color: #1a1333; padding: 8px; }
  .card { max-width: 360px; margin: 0 auto; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 16px 48px rgba(0,0,0,.25); }
  .header { height: 120px; background: {{themeColor}}; display: flex; align-items: flex-end; justify-content: space-between; padding: 16px; {{{headerBgStyle}}} }
  .header img.logo { width: 44px; height: 44px; object-fit: contain; background: #fff; border-radius: 10px; padding: 4px; }
  .body { padding: 0 22px 22px; margin-top: -44px; }
  .avatar { width: 88px; height: 88px; border-radius: 18px; border: 4px solid #fff; background: #fff; overflow: hidden; box-shadow: 0 6px 20px rgba(0,0,0,.15); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800; color: {{themeColor}}; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  h1 { font-size: 26px; font-weight: 800; margin-top: 14px; letter-spacing: -0.02em; }
  .tagline { font-size: 14px; color: {{themeColor}}; font-weight: 700; margin-top: 6px; }
  .role { font-size: 14px; color: #5c5470; margin-top: 4px; font-weight: 500; }
  .bio { font-size: 13px; color: #5c5470; line-height: 1.55; margin-top: 14px; }
  .contacts { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
  .contact { font-size: 13px; color: #5c5470; padding: 8px 10px; background: #faf8fd; border-radius: 8px; }
  .social { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }
  .pill { font-size: 11px; font-weight: 700; padding: 6px 12px; border-radius: 8px; background: {{themeColor}}; color: #fff; text-decoration: none; }
  .footer { margin-top: 16px; padding-top: 12px; border-top: 1px solid #e8e4f0; font-size: 11px; font-family: monospace; color: #8b839c; }
  {{{embedStyles}}}
</style>
</head>
<body>
  <div class="card">
    <div class="header">{{{logoHtml}}}</div>
    <div class="body">
      <div class="avatar">{{{avatarHtml}}}</div>
      <h1>{{fullName}}</h1>
      {{#if tagline}}<p class="tagline">{{tagline}}</p>{{/if}}
      <p class="role">{{roleLine}}</p>
      {{#if bio}}<p class="bio">{{bio}}</p>{{/if}}
      <div class="contacts">{{{contactsHtml}}}</div>
      {{{socialHtml}}}
      <div class="footer">{{cardUrl}}</div>
    </div>
  </div>
</body>
</html>
