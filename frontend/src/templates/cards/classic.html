<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f4f2f8; color: #1a1333; }
  .card { max-width: 360px; margin: 0 auto; background: #fff; border-radius: 20px; overflow: hidden; border: 1px solid #e8e4f0; box-shadow: 0 8px 28px rgba(26,19,51,.08); }
  .header { height: 88px; background: linear-gradient(135deg, {{themeColor}}, color-mix(in srgb, {{themeColor}} 65%, #fff)); position: relative; {{{headerBgStyle}}} }
  .header img.logo { position: absolute; right: 12px; bottom: 12px; width: 40px; height: 40px; object-fit: contain; background: #fff; border-radius: 8px; padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
  .body { padding: 0 20px 20px; margin-top: -36px; position: relative; }
  .avatar { width: 72px; height: 72px; border-radius: 16px; border: 3px solid #fff; background: #fff; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,.12); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; color: {{themeColor}}; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  h1 { font-size: 22px; font-weight: 700; margin-top: 12px; line-height: 1.2; }
  .tagline { font-size: 13px; color: {{themeColor}}; font-weight: 600; margin-top: 4px; }
  .role { font-size: 14px; color: #5c5470; margin-top: 4px; }
  .bio { font-size: 13px; color: #5c5470; line-height: 1.55; margin-top: 12px; }
  .contacts { margin-top: 16px; display: flex; flex-direction: column; gap: 6px; }
  .contact { font-size: 13px; color: #5c5470; }
  .social { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }
  .pill { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 999px; background: color-mix(in srgb, {{themeColor}} 12%, #fff); color: {{themeColor}}; text-decoration: none; }
  .footer { margin-top: 16px; padding-top: 12px; border-top: 1px solid #e8e4f0; font-size: 11px; font-family: monospace; color: #8b839c; word-break: break-all; }
  {{{embedStyles}}}
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      {{{logoHtml}}}
    </div>
    <div class="body">
      <div class="avatar">{{{avatarHtml}}}</div>
      <h1>{{fullName}}</h1>
      {{#if tagline}}<p class="tagline">{{tagline}}</p>{{/if}}
      <p class="role">{{roleLine}}</p>
      {{#if bio}}<p class="bio">{{bio}}</p>{{/if}}
      <div class="contacts">{{{contactsHtml}}}</div>
      {{{socialHtml}}}
      <div class="footer">{{cardUrl}}</div>
    </div>
  </div>
</body>
</html>
