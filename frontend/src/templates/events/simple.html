<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f4f2f8; color: #1a1333; }
  .invite { max-width: 400px; margin: 0 auto; background: #fff; border-radius: 20px; overflow: hidden; border: 1px solid #e8e4f0; box-shadow: 0 8px 28px rgba(26,19,51,.08); }
  .header { position: relative; padding: 28px 20px; min-height: 120px; color: #fff; {{{headerBgStyle}}} }
  .header .overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(26,19,51,.1), rgba(26,19,51,.55)); }
  .header-inner { position: relative; z-index: 1; text-align: center; }
  h1 { font-size: 22px; font-weight: 800; line-height: 1.2; }
  .subtitle { font-size: 13px; opacity: .92; margin-top: 6px; line-height: 1.45; }
  .meta { padding: 14px 18px; background: #faf8fd; border-bottom: 1px solid #e8e4f0; font-size: 12px; line-height: 1.55; color: #5c5470; text-align: center; }
  .meta p + p { margin-top: 4px; }
  .sections { padding: 14px 18px 18px; display: flex; flex-direction: column; gap: 16px; }
  .block-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: {{themeColor}}; margin-bottom: 10px; }
  .btn { display: inline-block; padding: 10px 18px; border-radius: 999px; font-size: 13px; font-weight: 700; text-decoration: none; margin-top: 8px; }
  .btn--primary { background: {{themeColor}}; color: #fff; }
  .btn--outline { border: 2px solid color-mix(in srgb, {{themeColor}} 40%, #e8e4f0); color: {{themeColor}}; background: #fff; }
  .countdown { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; text-align: center; }
  .countdown__num { display: block; font-size: 20px; font-weight: 800; color: {{themeColor}}; }
  .countdown__label { font-size: 9px; text-transform: uppercase; color: #8b839c; }
  .schedule-item { padding: 10px 0; border-bottom: 1px solid #f0ecf8; }
  .schedule-item:last-child { border-bottom: none; }
  .schedule-item__head { display: flex; justify-content: space-between; gap: 8px; font-size: 13px; }
  .schedule-item__desc { font-size: 11px; color: #8b839c; margin-top: 4px; }
  .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .gallery-item { aspect-ratio: 1; border-radius: 8px; background: #f0ecf8 center/cover no-repeat; }
  .registry-links { display: flex; flex-wrap: wrap; gap: 8px; }
  .registry-link { padding: 8px 14px; border-radius: 8px; background: #f0ecf8; font-size: 12px; font-weight: 600; color: {{themeColor}}; text-decoration: none; }
  .guest-msg { padding: 10px; border-radius: 10px; background: #faf8fd; margin-bottom: 8px; font-size: 12px; }
  .guest-msg strong { display: block; margin-bottom: 4px; }
  .video-embed { width: 100%; aspect-ratio: 16/9; border: none; border-radius: 10px; }
  .scratch-card { position: relative; border-radius: 14px; overflow: hidden; cursor: pointer; min-height: 100px; margin: 8px 0; }
  .scratch-card__cover { padding: 36px 16px; text-align: center; background: linear-gradient(135deg, {{themeColor}}, color-mix(in srgb, {{themeColor}} 60%, #1a1333)); color: #fff; font-weight: 700; }
  .scratch-card__inner { display: none; padding: 24px 16px; text-align: center; background: #faf8fd; font-size: 14px; }
  .scratch-card.revealed .scratch-card__cover { display: none; }
  .scratch-card.revealed .scratch-card__inner { display: block; }
  .footer { padding: 10px 16px; border-top: 1px solid #e8e4f0; font-size: 10px; font-family: monospace; color: #8b839c; word-break: break-all; }
  {{{embedStyles}}}
</style>
</head>
<body>
  <div class="invite invite--simple tpl-{{template}}">
    <div class="header"><div class="overlay"></div><div class="header-inner"><h1>{{title}}</h1>{{#if subtitle}}<p class="subtitle">{{subtitle}}</p>{{/if}}</div></div>
    {{{metaHtml}}}
    <div class="sections">{{{sectionsHtml}}}</div>
    <div class="footer">{{inviteUrl}}</div>
  </div>
</body>
</html>
