<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f0f9ff; color: #0f172a; }
  .invite { max-width: 400px; margin: 0 auto; background: #fff; border-radius: 16px; overflow: hidden; border: 1px solid #e0f2fe; box-shadow: 0 8px 24px rgba(14,116,144,.1); }
  .header { padding: 28px 20px; min-height: 110px; color: #fff; {{{headerBgStyle}}} }
  .header-inner { text-align: center; }
  h1 { font-size: 22px; font-weight: 800; }
  .subtitle { font-size: 13px; margin-top: 6px; opacity: .92; }
  .meta { padding: 14px 18px; font-size: 12px; color: #475569; text-align: center; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
  .sections { padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }
  .block-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: {{themeColor}}; margin-bottom: 8px; }
  .btn { display: inline-block; padding: 10px 18px; border-radius: 8px; font-weight: 700; text-decoration: none; font-size: 13px; }
  .btn--primary { background: {{themeColor}}; color: #fff; }
  .btn--outline { border: 2px solid {{themeColor}}; color: {{themeColor}}; }
  .countdown { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; text-align: center; }
  .countdown__num { font-size: 20px; font-weight: 800; color: {{themeColor}}; }
  .countdown__label { font-size: 9px; color: #94a3b8; text-transform: uppercase; }
  .schedule-item { padding: 10px; border-radius: 10px; background: #f1f5f9; margin-bottom: 6px; font-size: 12px; }
  .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .gallery-item { aspect-ratio: 1; border-radius: 8px; background: #e2e8f0 center/cover no-repeat; }
  .registry-link { padding: 8px 12px; border-radius: 8px; background: #e0f2fe; color: {{themeColor}}; text-decoration: none; font-size: 12px; margin: 4px 4px 0 0; display: inline-block; }
  .guest-msg { padding: 10px; border-radius: 8px; background: #f8fafc; font-size: 12px; margin-bottom: 6px; }
  .video-embed { width: 100%; aspect-ratio: 16/9; border: none; border-radius: 8px; }
  .scratch-card { border-radius: 12px; overflow: hidden; cursor: pointer; }
  .scratch-card__cover { padding: 32px; text-align: center; background: {{themeColor}}; color: #fff; font-weight: 700; }
  .scratch-card__inner { display: none; padding: 20px; text-align: center; }
  .scratch-card.revealed .scratch-card__cover { display: none; }
  .scratch-card.revealed .scratch-card__inner { display: block; }
  .footer { padding: 10px 16px; font-size: 10px; font-family: monospace; color: #94a3b8; word-break: break-all; border-top: 1px solid #e2e8f0; }
  {{{embedStyles}}}
</style>
</head>
<body>
  <div class="invite invite--celebration tpl-{{template}}">
    <div class="header"><div class="header-inner"><h1>{{title}}</h1>{{#if subtitle}}<p class="subtitle">{{subtitle}}</p>{{/if}}</div></div>
    {{{metaHtml}}}
    <div class="sections">{{{sectionsHtml}}}</div>
    <div class="footer">{{inviteUrl}}</div>
  </div>
</body>
</html>
