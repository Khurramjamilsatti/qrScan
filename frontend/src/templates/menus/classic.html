<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f4f2f8; color: #1a1333; }
  .menu { max-width: 400px; margin: 0 auto; background: #fff; border-radius: 20px; overflow: hidden; border: 1px solid #e8e4f0; box-shadow: 0 8px 28px rgba(26,19,51,.08); }
  .header { position: relative; padding: 20px; min-height: 88px; color: #fff; {{{headerBgStyle}}} }
  .header .overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(26,19,51,.15), rgba(26,19,51,.5)); }
  .header-inner { position: relative; z-index: 1; }
  .logo { width: 40px; height: 40px; border-radius: 10px; object-fit: cover; border: 2px solid rgba(255,255,255,.85); margin-bottom: 8px; display: block; }
  h1 { font-size: 20px; font-weight: 800; line-height: 1.2; }
  .tagline { font-size: 12px; opacity: .92; margin-top: 4px; line-height: 1.45; }
  .info { display: flex; flex-wrap: wrap; gap: 8px 14px; padding: 10px 16px; font-size: 11px; color: #5c5470; background: #faf8fd; border-bottom: 1px solid #e8e4f0; }
  .sections { padding: 12px 16px 16px; display: flex; flex-direction: column; gap: 16px; }
  .section-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: {{themeColor}}; padding-bottom: 6px; border-bottom: 2px solid color-mix(in srgb, {{themeColor}} 25%, #e8e4f0); margin-bottom: 8px; }
  .item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f0ecf8; }
  .item:last-child { border-bottom: none; }
  .item-img { width: 44px; height: 44px; border-radius: 8px; background: #f0ecf8 center/cover no-repeat; flex-shrink: 0; }
  .item-body { flex: 1; min-width: 0; }
  .item-head { display: flex; justify-content: space-between; gap: 8px; align-items: baseline; }
  .item-head strong { font-size: 13px; }
  .price { font-size: 13px; font-weight: 700; color: {{themeColor}}; white-space: nowrap; }
  .desc { font-size: 11px; color: #8b839c; margin-top: 3px; line-height: 1.4; }
  .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .tag { font-size: 9px; font-weight: 700; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; background: #f0ecf8; color: #6b4fa0; }
  .footer { padding: 10px 16px; border-top: 1px solid #e8e4f0; font-size: 10px; font-family: monospace; color: #8b839c; word-break: break-all; }
  {{{embedStyles}}}
</style>
</head>
<body>
  <div class="menu">
    <div class="header"><div class="overlay"></div><div class="header-inner">{{{logoHtml}}}<h1>{{name}}</h1>{{#if description}}<p class="tagline">{{description}}</p>{{/if}}</div></div>
    {{{infoHtml}}}
    <div class="sections">{{{sectionsHtml}}}</div>
    <div class="footer">{{menuUrl}}</div>
  </div>
</body>
</html>
