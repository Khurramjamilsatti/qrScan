<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, 'Times New Roman', serif; background: #1a1410; color: #f8f4ee; }
  .menu { max-width: 400px; margin: 0 auto; background: #231c17; border-radius: 16px; overflow: hidden; border: 1px solid #3d3228; box-shadow: 0 16px 48px rgba(0,0,0,.35); }
  .header { padding: 24px 20px; text-align: center; border-bottom: 1px solid #3d3228; {{{headerBgStyle}}} position: relative; color: #fff; }
  .header .overlay { position: absolute; inset: 0; background: rgba(0,0,0,.45); }
  .header-inner { position: relative; z-index: 1; }
  .logo { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; margin: 0 auto 10px; display: block; border: 1px solid rgba(255,255,255,.3); }
  h1 { font-size: 24px; font-weight: 400; letter-spacing: .04em; }
  .tagline { font-size: 12px; font-style: italic; opacity: .85; margin-top: 6px; font-family: system-ui, sans-serif; }
  .info { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px 14px; padding: 10px 16px; font-size: 11px; color: #c4b8a8; font-family: system-ui, sans-serif; border-bottom: 1px solid #3d3228; }
  .sections { padding: 16px 18px 20px; display: flex; flex-direction: column; gap: 20px; }
  .section-title { font-size: 13px; font-weight: 400; text-transform: uppercase; letter-spacing: .12em; color: {{themeColor}}; text-align: center; padding-bottom: 8px; border-bottom: 1px solid #3d3228; margin-bottom: 10px; }
  .item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px dashed #3d3228; }
  .item:last-child { border-bottom: none; }
  .item-img { width: 48px; height: 48px; border-radius: 6px; background: #2f261f center/cover no-repeat; flex-shrink: 0; }
  .item-body { flex: 1; }
  .item-head { display: flex; justify-content: space-between; gap: 8px; }
  .item-head strong { font-size: 14px; font-weight: 400; }
  .price { font-size: 13px; color: {{themeColor}}; font-family: system-ui, sans-serif; }
  .desc { font-size: 11px; color: #a89888; margin-top: 4px; line-height: 1.45; font-family: system-ui, sans-serif; font-style: italic; }
  .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
  .tag { font-size: 9px; font-weight: 600; text-transform: uppercase; padding: 2px 6px; border: 1px solid #3d3228; color: #c4b8a8; font-family: system-ui, sans-serif; }
  .footer { padding: 10px 16px; border-top: 1px solid #3d3228; font-size: 10px; font-family: monospace; color: #7a6e62; text-align: center; }
  {{{embedStyles}}}
</style>
</head>
<body>
  <div class="menu">
    <div class="header"><div class="overlay"></div><div class="header-inner">{{{logoHtml}}}<h1>{{name}}</h1>{{#if description}}<p class="tagline">{{description}}</p>{{/if}}</div></div>
    {{{infoHtml}}}
    <div class="sections">{{{sectionsHtml}}}</div>
    <div class="footer">{{menuUrl}}</div>
  </div>
</body>
</html>
