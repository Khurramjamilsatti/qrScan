<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #fff; color: #1a1333; }
  .menu { max-width: 400px; margin: 0 auto; padding: 24px 20px; }
  h1 { font-size: 22px; font-weight: 800; text-align: center; }
  .tagline { font-size: 12px; color: #8b839c; text-align: center; margin-top: 4px; line-height: 1.45; }
  .logo { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; margin: 0 auto 10px; display: block; }
  .info { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px 12px; padding: 12px 0; font-size: 11px; color: #8b839c; border-bottom: 1px solid #e8e4f0; margin-bottom: 16px; }
  .sections { display: flex; flex-direction: column; gap: 18px; }
  .section-title { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; color: {{themeColor}}; margin-bottom: 8px; }
  .item--minimal { padding: 6px 0; border-bottom: 1px solid #f0ecf8; }
  .item--minimal:last-child { border-bottom: none; }
  .item-head { display: flex; justify-content: space-between; gap: 8px; align-items: baseline; }
  .item-head strong { font-size: 13px; }
  .price { font-size: 13px; font-weight: 700; color: {{themeColor}}; }
  .desc { font-size: 11px; color: #8b839c; margin-top: 2px; line-height: 1.4; }
  .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 3px; }
  .tag { font-size: 9px; font-weight: 600; text-transform: uppercase; color: #6b4fa0; }
  .footer { margin-top: 16px; padding-top: 12px; border-top: 1px solid #e8e4f0; font-size: 10px; font-family: monospace; color: #8b839c; text-align: center; }
  {{{embedStyles}}}
</style>
</head>
<body>
  <div class="menu">
    <div class="header-inner">{{{logoHtml}}}<h1>{{name}}</h1>{{#if description}}<p class="tagline">{{description}}</p>{{/if}}</div>
    {{{infoHtml}}}
    <div class="sections">{{{sectionsHtml}}}</div>
    <div class="footer">{{menuUrl}}</div>
  </div>
</body>
</html>
