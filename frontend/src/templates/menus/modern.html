<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: linear-gradient(180deg, color-mix(in srgb, {{themeColor}} 6%, #fff), #f8f6fc); color: #1a1333; }
  .menu { max-width: 400px; margin: 0 auto; background: #fff; border-radius: 24px; overflow: hidden; border: 1px solid #e8e4f0; box-shadow: 0 12px 36px rgba(26,19,51,.1); text-align: center; }
  .header { padding: 24px 20px 16px; {{{headerBgStyle}}} color: #fff; position: relative; }
  .header .overlay { position: absolute; inset: 0; background: linear-gradient(180deg, transparent, rgba(26,19,51,.45)); }
  .header-inner { position: relative; z-index: 1; }
  .logo { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 3px solid #fff; margin: 0 auto 10px; display: block; box-shadow: 0 4px 16px rgba(0,0,0,.15); }
  h1 { font-size: 22px; font-weight: 800; }
  .tagline { font-size: 12px; opacity: .92; margin-top: 6px; line-height: 1.5; }
  .info { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px 12px; padding: 10px 16px; font-size: 11px; color: #5c5470; background: #faf8fd; border-bottom: 1px solid #e8e4f0; }
  .sections { padding: 14px 16px 18px; display: flex; flex-direction: column; gap: 18px; text-align: left; }
  .section-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; color: {{themeColor}}; text-align: center; margin-bottom: 10px; }
  .item { background: #faf8fd; border: 1px solid #e8e4f0; border-radius: 14px; padding: 12px; margin-bottom: 8px; }
  .item:last-child { margin-bottom: 0; }
  .item-img { width: 100%; height: 96px; border-radius: 10px; background: #f0ecf8 center/cover no-repeat; margin-bottom: 8px; }
  .item-head { display: flex; justify-content: space-between; gap: 8px; align-items: baseline; }
  .item-head strong { font-size: 14px; }
  .price { font-size: 14px; font-weight: 800; color: {{themeColor}}; }
  .desc { font-size: 11px; color: #8b839c; margin-top: 4px; line-height: 1.45; }
  .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; justify-content: center; }
  .tag { font-size: 9px; font-weight: 700; text-transform: uppercase; padding: 3px 8px; border-radius: 999px; background: color-mix(in srgb, {{themeColor}} 12%, #fff); color: {{themeColor}}; }
  .footer { padding: 10px 16px; border-top: 1px solid #e8e4f0; font-size: 10px; font-family: monospace; color: #8b839c; text-align: center; }
  {{{embedStyles}}}
</style>
</head>
<body>
  <div class="menu">
    <div class="header"><div class="overlay"></div><div class="header-inner">{{{logoHtml}}}<h1>{{name}}</h1>{{#if description}}<p class="tagline">{{description}}</p>{{/if}}</div></div>
    {{{infoHtml}}}
    <div class="sections">{{{sectionsHtml}}}</div>
    <div class="footer">{{menuUrl}}</div>
  </div>
</body>
</html>
