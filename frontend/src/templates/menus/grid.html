<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f4f2f8; color: #1a1333; }
  .menu { max-width: 400px; margin: 0 auto; background: #fff; border-radius: 20px; overflow: hidden; border: 1px solid #e8e4f0; box-shadow: 0 8px 28px rgba(26,19,51,.08); }
  .header { padding: 18px 16px; text-align: center; border-bottom: 1px solid #e8e4f0; {{{headerBgStyle}}} color: #fff; position: relative; }
  .header .overlay { position: absolute; inset: 0; background: rgba(26,19,51,.35); }
  .header-inner { position: relative; z-index: 1; }
  .logo { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; margin: 0 auto 8px; display: block; }
  h1 { font-size: 18px; font-weight: 800; }
  .tagline { font-size: 11px; opacity: .9; margin-top: 4px; }
  .info { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px 10px; padding: 8px 12px; font-size: 10px; color: #5c5470; background: #faf8fd; border-bottom: 1px solid #e8e4f0; }
  .sections { padding: 12px 14px 16px; display: flex; flex-direction: column; gap: 14px; }
  .section-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: {{themeColor}}; margin-bottom: 8px; }
  .section--grid .section-items { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: stretch; }
  .item--grid { border: 1px solid #e8e4f0; border-radius: 12px; overflow: hidden; background: #faf8fd; display: flex; flex-direction: column; height: 100%; }
  .item--grid .item-img { width: 100%; height: 80px; background: #f0ecf8 center/cover no-repeat; flex-shrink: 0; }
  .item--grid .item-img--empty { background: linear-gradient(135deg, #f0ecf8, #e8e4f0); }
  .item--grid .item-body { flex: 1; display: flex; flex-direction: column; padding: 10px; }
  .item--grid .item-head { display: flex; flex-direction: row; justify-content: space-between; align-items: flex-start; gap: 6px; }
  .item--grid .item-head strong { flex: 1; min-width: 0; font-size: 12px; line-height: 1.3; }
  .item--grid .price { flex-shrink: 0; font-size: 12px; font-weight: 700; color: {{themeColor}}; }
  .item--grid .desc { font-size: 10px; color: #8b839c; margin-top: 4px; line-height: 1.4; flex: 1; min-height: 2.8em; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .item--grid .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: auto; padding-top: 6px; }
  .tag { font-size: 8px; font-weight: 700; text-transform: uppercase; padding: 1px 5px; border-radius: 4px; background: #f0ecf8; color: #6b4fa0; }
  .footer { padding: 8px 14px; border-top: 1px solid #e8e4f0; font-size: 10px; font-family: monospace; color: #8b839c; text-align: center; }
  {{{embedStyles}}}
</style>
</head>
<body>
  <div class="menu">
    <div class="header"><div class="overlay"></div><div class="header-inner">{{{logoHtml}}}<h1>{{name}}</h1>{{#if description}}<p class="tagline">{{description}}</p>{{/if}}</div></div>
    {{{infoHtml}}}
    <div class="sections">{{{sectionsHtml}}}</div>
    <div class="footer">{{menuUrl}}</div>
  </div>
</body>
</html>
